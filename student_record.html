<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Record System</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{--primary:#6C63FF;--dark:#0f0f1a;--card:#1a1a2e;--text:#e0e0e0;--muted:#888;--green:#00e676;--red:#ff5252;--yellow:#ffd740;}
    body{background:var(--dark);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh;}
    header{background:var(--card);padding:1rem 2rem;display:flex;align-items:center;gap:1rem;border-bottom:1px solid #ffffff10;}
    header a{color:var(--muted);text-decoration:none;font-size:0.9rem;}
    header a:hover{color:var(--primary);}
    header h1{font-size:1.3rem;color:var(--primary);}
    .badge{background:#6C63FF22;color:var(--primary);padding:3px 10px;border-radius:20px;font-size:0.75rem;margin-left:0.5rem;}
    .container{max-width:900px;margin:2rem auto;padding:0 1.5rem;}
    .panel{background:var(--card);border-radius:12px;padding:1.5rem;margin-bottom:1.5rem;border:1px solid #ffffff0f;}
    .panel h2{font-size:1rem;color:var(--muted);margin-bottom:1rem;text-transform:uppercase;letter-spacing:1px;}
    .form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:1rem;}
    input{background:#0f0f1a;border:1px solid #ffffff15;color:var(--text);padding:0.6rem 1rem;border-radius:8px;font-size:0.9rem;width:100%;outline:none;}
    input:focus{border-color:var(--primary);}
    input::placeholder{color:var(--muted);}
    .marks-row{display:grid;grid-template-columns:repeat(5,1fr);gap:0.7rem;margin-bottom:1rem;}
    .btn{padding:0.6rem 1.4rem;border:none;border-radius:8px;font-size:0.9rem;cursor:pointer;font-weight:600;transition:all 0.2s;}
    .btn-primary{background:var(--primary);color:#fff;}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 5px 15px #6C63FF44;}
    .btn-danger{background:#ff525222;color:var(--red);border:1px solid var(--red);}
    .btn-danger:hover{background:var(--red);color:#fff;}
    .btn-sm{padding:0.3rem 0.8rem;font-size:0.78rem;}
    table{width:100%;border-collapse:collapse;}
    th{background:#ffffff08;color:var(--muted);font-size:0.8rem;padding:0.7rem 1rem;text-align:left;text-transform:uppercase;letter-spacing:0.5px;}
    td{padding:0.75rem 1rem;border-bottom:1px solid #ffffff08;font-size:0.9rem;}
    tr:hover td{background:#ffffff04;}
    .grade{display:inline-block;padding:2px 10px;border-radius:20px;font-size:0.78rem;font-weight:700;}
    .grade-A{background:#00e67622;color:var(--green);}
    .grade-B{background:#6C63FF22;color:var(--primary);}
    .grade-C{background:#ffd74022;color:var(--yellow);}
    .grade-D{background:#ff980022;color:#ff9800;}
    .grade-F{background:#ff525222;color:var(--red);}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1rem;}
    .stat-box{background:#ffffff05;border-radius:10px;padding:1rem;text-align:center;}
    .stat-box .num{font-size:1.8rem;font-weight:700;color:var(--primary);}
    .stat-box .lbl{font-size:0.8rem;color:var(--muted);margin-top:4px;}
    .empty{text-align:center;color:var(--muted);padding:2rem;font-size:0.9rem;}
    .search-bar{display:flex;gap:0.8rem;margin-bottom:1rem;}
    .search-bar input{flex:1;}
    .toast{position:fixed;bottom:2rem;right:2rem;background:var(--primary);color:#fff;padding:0.8rem 1.5rem;border-radius:10px;font-size:0.9rem;opacity:0;transform:translateY(20px);transition:all 0.3s;pointer-events:none;z-index:999;}
    .toast.show{opacity:1;transform:translateY(0);}
  </style>
</head>
<body>
<header>
  <a href="index.html">← Back to Portfolio</a>
  <h1>⚙️ Student Record System <span class="badge">C Language</span></h1>
</header>

<div class="container">

  <!-- ADD STUDENT -->
  <div class="panel">
    <h2>➕ Add Student</h2>
    <div class="form-row">
      <input id="sId"   type="number" placeholder="Student ID"/>
      <input id="sName" type="text"   placeholder="Full Name"/>
    </div>
    <p style="font-size:0.82rem;color:var(--muted);margin-bottom:0.5rem;">Enter marks for 5 subjects (0–100):</p>
    <div class="marks-row">
      <input id="m1" type="number" placeholder="Sub 1" min="0" max="100"/>
      <input id="m2" type="number" placeholder="Sub 2" min="0" max="100"/>
      <input id="m3" type="number" placeholder="Sub 3" min="0" max="100"/>
      <input id="m4" type="number" placeholder="Sub 4" min="0" max="100"/>
      <input id="m5" type="number" placeholder="Sub 5" min="0" max="100"/>
    </div>
    <button class="btn btn-primary" onclick="addStudent()">Add Student</button>
  </div>

  <!-- STATS -->
  <div class="panel">
    <h2>📊 Class Statistics</h2>
    <div class="stats-grid">
      <div class="stat-box"><div class="num" id="st-total">0</div><div class="lbl">Total Students</div></div>
      <div class="stat-box"><div class="num" id="st-avg">–</div><div class="lbl">Class Average</div></div>
      <div class="stat-box"><div class="num" id="st-high">–</div><div class="lbl">Highest</div></div>
      <div class="stat-box"><div class="num" id="st-low">–</div><div class="lbl">Lowest</div></div>
    </div>
  </div>

  <!-- RECORDS TABLE -->
  <div class="panel">
    <h2>📋 All Records</h2>
    <div class="search-bar">
      <input id="searchInput" type="text" placeholder="Search by name or ID..." oninput="renderTable()"/>
    </div>
    <table>
      <thead>
        <tr>
          <th>ID</th><th>Name</th><th>Marks</th><th>Average</th><th>Grade</th><th>Action</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="6" class="empty">No students added yet.</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let students = JSON.parse(localStorage.getItem('students') || '[]');

  function grade(avg){
    if(avg>=90)return'A'; if(avg>=80)return'B';
    if(avg>=70)return'C'; if(avg>=60)return'D'; return'F';
  }

  function toast(msg){
    const t=document.getElementById('toast');
    t.textContent=msg; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),2500);
  }

  function addStudent(){
    const id   = parseInt(document.getElementById('sId').value);
    const name = document.getElementById('sName').value.trim();
    const marks= [1,2,3,4,5].map(i=>parseFloat(document.getElementById('m'+i).value));

    if(!id||!name){toast('⚠️ Enter ID and Name!');return;}
    if(marks.some(isNaN)||marks.some(m=>m<0||m>100)){toast('⚠️ Enter valid marks (0-100)!');return;}
    if(students.find(s=>s.id===id)){toast('⚠️ ID already exists!');return;}

    const avg=(marks.reduce((a,b)=>a+b,0)/5).toFixed(2);
    students.push({id,name,marks,avg:parseFloat(avg),grade:grade(avg)});
    save(); renderTable(); updateStats();
    ['sId','sName','m1','m2','m3','m4','m5'].forEach(id=>document.getElementById(id).value='');
    toast('✅ Student added!');
  }

  function deleteStudent(id){
    students=students.filter(s=>s.id!==id);
    save(); renderTable(); updateStats();
    toast('🗑️ Student deleted!');
  }

  function renderTable(){
    const q=document.getElementById('searchInput').value.toLowerCase();
    const filtered=students.filter(s=>s.name.toLowerCase().includes(q)||String(s.id).includes(q));
    const tbody=document.getElementById('tableBody');
    if(!filtered.length){tbody.innerHTML='<tr><td colspan="6" class="empty">No records found.</td></tr>';return;}
    tbody.innerHTML=filtered.map(s=>`
      <tr>
        <td>${s.id}</td>
        <td>${s.name}</td>
        <td style="font-size:0.8rem;color:var(--muted)">${s.marks.join(', ')}</td>
        <td><strong>${s.avg}</strong></td>
        <td><span class="grade grade-${s.grade}">${s.grade}</span></td>
        <td><button class="btn btn-danger btn-sm" onclick="deleteStudent(${s.id})">Delete</button></td>
      </tr>`).join('');
  }

  function updateStats(){
    document.getElementById('st-total').textContent=students.length;
    if(!students.length){['st-avg','st-high','st-low'].forEach(id=>document.getElementById(id).textContent='–');return;}
    const avgs=students.map(s=>s.avg);
    document.getElementById('st-avg').textContent=(avgs.reduce((a,b)=>a+b,0)/avgs.length).toFixed(1);
    document.getElementById('st-high').textContent=Math.max(...avgs).toFixed(1);
    document.getElementById('st-low').textContent=Math.min(...avgs).toFixed(1);
  }

  function save(){localStorage.setItem('students',JSON.stringify(students));}

  renderTable(); updateStats();
</script>
</body>
</html>
